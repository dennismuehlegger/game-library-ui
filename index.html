<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Game Library Tool</h1>
    <div class="user-selector">
        <label for="users">Choose a user:</label>
        <select name="users" id="users"></select>
    </div>
</header>

<div class="tab">
    <button class="tablinks" onclick="openTab(event, 'Market Place')">Market Place</button>
    <button class="tablinks" onclick="openTab(event, 'Game Library')">Game Library</button>
    <button class="tablinks" onclick="openTab(event, 'Transaction History')">Transaction History</button>
</div>

<div id="Market Place" class="tabcontent">
    <div id="game-list"></div>
</div>

<div id="Game Library" class="tabcontent">
    <div id="owned-game-list"></div>
</div>

<div id="Transaction History" class="tabcontent">
    <div id="transaction-list"></div>
</div>

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
